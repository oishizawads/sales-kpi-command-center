<script type="module">
import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@1.8.1/build/stlite.js";
mount({"requirements": ["numpy", "pandas", "plotly"], "entrypoint": "app/streamlit_app.py", "files": {"app/streamlit_app.py": "\"\"\"Sales KPI Command Center — Streamlitエントリポイント。\n\nUIは薄く保ち、集計・閾値判定は src/ に委譲する。\n実行: streamlit run app/streamlit_app.py\n\"\"\"\n\nfrom __future__ import annotations\n\nimport sys\nfrom pathlib import Path\n\nimport pandas as pd\nimport plotly.express as px\nimport plotly.graph_objects as go\nimport streamlit as st\n\nsys.path.insert(0, str(Path(__file__).resolve().parents[1]))\n\nfrom src.alerts import DEFAULT_THRESHOLDS, evaluate_alerts\nfrom src.data import REQUIRED_COLUMNS, generate_synthetic_data, validate_dataframe\nfrom src.funnel import compute_funnel, compute_funnel_table\nfrom src.metrics import compute_churn_rate, compute_mrr_trend, compute_summary\n\nst.set_page_config(\n    page_title=\"Sales KPI Command Center\",\n    page_icon=\"📊\",\n    layout=\"wide\",\n    initial_sidebar_state=\"expanded\",\n)\n\nSEVERITY_STYLE = {\n    \"CRITICAL\": (\"🔴\", \"critical\"),\n    \"WARNING\": (\"🟠\", \"warning\"),\n    \"INFO\": (\"🔵\", \"info\"),\n}\n\n\n# ---------- データ読み込み ----------\n\n@st.cache_data(show_spinner=False)\ndef _cached_synthetic(months: int, seed: int) -> pd.DataFrame:\n    return generate_synthetic_data(months=months, seed=seed)\n\n\n@st.cache_data(show_spinner=False)\ndef _cached_summary(df: pd.DataFrame) -> dict:\n    return compute_summary(df)\n\n\n@st.cache_data(show_spinner=False)\ndef _cached_mrr_trend(df: pd.DataFrame) -> pd.DataFrame:\n    return compute_mrr_trend(df)\n\n\n@st.cache_data(show_spinner=False)\ndef _cached_funnel(df: pd.DataFrame, month: str | None) -> dict:\n    return compute_funnel(df, month=month)\n\n\n@st.cache_data(show_spinner=False)\ndef _cached_funnel_table(df: pd.DataFrame) -> pd.DataFrame:\n    return compute_funnel_table(df)\n\n\n@st.cache_data(show_spinner=False)\ndef _cached_alerts(df: pd.DataFrame, thresholds_tuple: tuple) -> list:\n    thresholds = dict(thresholds_tuple)\n    return evaluate_alerts(df, thresholds=thresholds)\n\n\ndef _thresholds_to_tuple(th: dict) -> tuple:\n    return tuple(sorted(th.items()))\n\n\n# ---------- サイドバー ----------\n\nwith st.sidebar:\n    st.header(\"⚙️ Data & Settings\")\n    data_mode = st.radio(\"Data source\", [\"Synthetic (sample)\", \"Upload CSV\"], index=0)\n\n    df: pd.DataFrame\n    if data_mode == \"Synthetic (sample)\":\n        col1, col2 = st.columns(2)\n        with col1:\n            months_n = st.number_input(\"Months\", min_value=3, max_value=60, value=24, step=1)\n        with col2:\n            seed = st.number_input(\"Seed\", min_value=0, max_value=10_000, value=42, step=1)\n        if st.button(\"Regenerate\", type=\"primary\", width=\"stretch\"):\n            st.session_state[\"regen_counter\"] = st.session_state.get(\"regen_counter\", 0) + 1\n        regen = st.session_state.get(\"regen_counter\", 0)\n        df = _cached_synthetic(int(months_n) + regen * 0, int(seed) + regen)\n    else:\n        uploaded = st.file_uploader(\n            \"Upload KPI CSV\", type=[\"csv\"],\n            help=f\"Required columns: {', '.join(REQUIRED_COLUMNS)}\",\n        )\n        if uploaded is not None:\n            try:\n                raw = pd.read_csv(uploaded)\n            except Exception as exc:\n                st.error(f\"Could not parse CSV: {exc}\")\n                df = pd.DataFrame()\n            else:\n                df = validate_dataframe(raw)\n        else:\n            df = pd.DataFrame()\n\n    st.divider()\n    st.subheader(\"Alert thresholds\")\n    th_churn_warn = st.slider(\"Churn warning\", 0.01, 0.20, float(DEFAULT_THRESHOLDS[\"churn_warning\"]), 0.005, format=\"%.3f\")\n    th_churn_crit = st.slider(\"Churn critical\", 0.02, 0.30, float(DEFAULT_THRESHOLDS[\"churn_critical\"]), 0.005, format=\"%.3f\")\n    th_mrr_warn = st.slider(\"MRR drop warning\", -0.30, -0.01, float(DEFAULT_THRESHOLDS[\"mrr_drop_warning\"]), 0.01, format=\"%.2f\")\n    th_mrr_crit = st.slider(\"MRR drop critical\", -0.50, -0.02, float(DEFAULT_THRESHOLDS[\"mrr_drop_critical\"]), 0.01, format=\"%.2f\")\n    th_conv_warn = st.slider(\"Conversion warning\", 0.001, 0.10, float(DEFAULT_THRESHOLDS[\"conversion_warning\"]), 0.001, format=\"%.3f\")\n\n    thresholds = {\n        \"churn_warning\": th_churn_warn,\n        \"churn_critical\": max(th_churn_crit, th_churn_warn + 0.005),\n        \"mrr_drop_warning\": th_mrr_warn,\n        \"mrr_drop_critical\": min(th_mrr_crit, th_mrr_warn - 0.01),\n        \"conversion_warning\": th_conv_warn,\n        \"conversion_critical\": float(DEFAULT_THRESHOLDS[\"conversion_critical\"]),\n        \"negative_mrr_streak\": int(DEFAULT_THRESHOLDS[\"negative_mrr_streak\"]),\n    }\n\n    st.divider()\n    with st.expander(\"Required CSV schema\", expanded=False):\n        st.code(\", \".join(REQUIRED_COLUMNS), language=\"text\")\n        st.caption(\"Numeric columns must be non-negative. month = YYYY-MM string.\")\n\n\n# ---------- ヘルパー ----------\n\ndef _fmt_money(x: float) -> str:\n    return f\"${x:,.0f}\"\n\n\ndef _fmt_pct(x: float, sign: bool = False) -> str:\n    return f\"{x:+.1%}\" if sign else f\"{x:.1%}\"\n\n\ndef _empty_state(msg: str) -> None:\n    st.info(msg)\n\n\ndef _fig_base(fig: go.Figure, title: str, y_title: str) -> go.Figure:\n    fig.update_layout(\n        title=title,\n        xaxis_title=\"Month\",\n        yaxis_title=y_title,\n        height=380,\n        margin=dict(l=10, r=10, t=50, b=10),\n        legend=dict(orientation=\"h\", yanchor=\"bottom\", y=1.02, xanchor=\"right\", x=1),\n    )\n    return fig\n\n\ndef _chart(fig: go.Figure, key: str) -> None:\n    \"\"\"plotly_chartを一意キー付きで描画（重複要素IDエラーを回避）。\"\"\"\n    st.plotly_chart(fig, width=\"stretch\", key=key)\n\n\n# ---------- メイン ----------\n\nfrom src.brand import apply_brand, hero\napply_brand(st)\nhero(st, \"Analytics Dashboard\", \"Sales KPI Command Center\", \"SaaS の主要 KPI を一覧し、異常値と次の確認ポイントを表示します。\")\nst.caption(\"Synthetic SaaS KPI dashboard — data is generated, not from any real company.\")\n\nif df is None or df.empty:\n    _empty_state(\n        \"No data to display yet. Choose **Synthetic (sample)** in the sidebar, \"\n        \"or upload a CSV with the required columns.\"\n    )\n    st.stop()\n\nvalid_months = sorted(df[\"month\"].astype(str).unique())\nselected_month = st.selectbox(\"Focus month\", valid_months, index=len(valid_months) - 1)\n\nsummary = _cached_summary(df)\nmrr_trend = _cached_mrr_trend(df)\nfunnel = _cached_funnel(df, selected_month)\nfunnel_table = _cached_funnel_table(df)\nalerts = _cached_alerts(df, _thresholds_to_tuple(thresholds))\n\ntab_overview, tab_funnel, tab_revenue, tab_churn, tab_alerts = st.tabs(\n    [\"KPI Overview\", \"Funnel\", \"Revenue Trend\", \"Churn\", \"Alerts\"]\n)\n\nwith tab_overview:\n    c1, c2, c3, c4 = st.columns(4)\n    c1.metric(\"MRR\", _fmt_money(summary[\"mrr\"]), _fmt_pct(summary[\"mrr_growth\"], sign=True))\n    c2.metric(\"Customers\", f\"{summary['customers']:,}\", f\"{summary['net_new_customers']:+d}\")\n    c3.metric(\"Churn rate\", _fmt_pct(summary[\"churn_rate\"]))\n    c4.metric(\"Conversion (won/leads)\", _fmt_pct(summary[\"conversion_rate\"]))\n\n    st.markdown(f\"**Latest month:** {summary['latest_month']}  •  **Previous:** {summary['prev_month']}\")\n\n    spark_c1, spark_c2 = st.columns(2)\n    with spark_c1:\n        fig = px.area(mrr_trend, x=\"month\", y=\"mrr\", labels={\"mrr\": \"MRR (USD)\", \"month\": \"Month\"})\n        _fig_base(fig, \"MRR trend\", \"MRR (USD)\")\n        _chart(fig, \"overview_mrr\")\n    with spark_c2:\n        churn_df = df.sort_values(\"month\").copy()\n        churn_df[\"churn_rate\"] = compute_churn_rate(churn_df)\n        fig = px.line(churn_df, x=\"month\", y=\"churn_rate\", labels={\"churn_rate\": \"Churn rate\", \"month\": \"Month\"})\n        fig.update_yaxes(tickformat=\".0%\")\n        _fig_base(fig, \"Churn rate trend\", \"Churn rate\")\n        _chart(fig, \"overview_churn\")\n\nwith tab_funnel:\n    col_a, col_b = st.columns([1, 1])\n    with col_a:\n        st.subheader(f\"Funnel — {funnel['month']}\")\n        if funnel[\"total_leads\"] > 0:\n            stage_names = list(funnel[\"stages\"].keys())\n            stage_vals = list(funnel[\"stages\"].values())\n            fig = go.Figure(go.Funnel(y=stage_names, x=stage_vals, textinfo=\"value+percent initial\"))\n            fig.update_layout(height=380, margin=dict(l=10, r=10, t=30, b=10))\n            _chart(fig, \"funnel_chart\")\n        else:\n            st.info(\"No leads in the selected month.\")\n    with col_b:\n        st.markdown(\"**Step conversion rates**\")\n        if funnel[\"step_rates\"]:\n            for step, rate in funnel[\"step_rates\"].items():\n                st.write(f\"- {step}: **{_fmt_pct(rate)}**\")\n            st.write(f\"- Overall (Lead→Won): **{_fmt_pct(funnel['overall_rate'])}**\")\n        else:\n            st.write(\"—\")\n\n    st.markdown(\"---\")\n    st.subheader(\"Monthly funnel breakdown\")\n    st.dataframe(funnel_table, width=\"stretch\", hide_index=True)\n\nwith tab_revenue:\n    st.subheader(\"MRR trend & MoM growth\")\n    col_l, col_r = st.columns([2, 1])\n    with col_l:\n        fig = px.line(mrr_trend, x=\"month\", y=\"mrr\", labels={\"mrr\": \"MRR (USD)\", \"month\": \"Month\"})\n        _fig_base(fig, \"Monthly MRR\", \"MRR (USD)\")\n        _chart(fig, \"revenue_mrr\")\n    with col_r:\n        fig = px.bar(mrr_trend, x=\"month\", y=\"mrr_growth\", labels={\"mrr_growth\": \"MoM growth\", \"month\": \"Month\"})\n        fig.update_yaxes(tickformat=\".0%\")\n        _fig_base(fig, \"MRR MoM growth\", \"MoM growth\")\n        _chart(fig, \"revenue_mom\")\n\nwith tab_churn:\n    st.subheader(\"Churn\")\n    churn_df = df.sort_values(\"month\").copy()\n    churn_df[\"churn_rate\"] = compute_churn_rate(churn_df)\n    col_l, col_r = st.columns(2)\n    with col_l:\n        fig = px.bar(churn_df, x=\"month\", y=\"churned_customers\", labels={\"churned_customers\": \"Churned customers\", \"month\": \"Month\"})\n        _fig_base(fig, \"Churned customers / month\", \"Customers\")\n        _chart(fig, \"churn_bar\")\n    with col_r:\n        fig = px.line(churn_df, x=\"month\", y=\"churn_rate\", labels={\"churn_rate\": \"Churn rate\", \"month\": \"Month\"})\n        fig.update_yaxes(tickformat=\".0%\")\n        _fig_base(fig, \"Churn rate trend\", \"Churn rate\")\n        _chart(fig, \"churn_rate\")\n    st.caption(\"Churn rate = churned_customers / customers. Customers is end-of-month count (0 のとき 0)。\")\n\nwith tab_alerts:\n    st.subheader(f\"Alerts ({len(alerts)})\")\n    if not alerts:\n        st.success(\"No alerts — all KPIs within thresholds.\")\n    else:\n        for a in alerts:\n            icon, kind = SEVERITY_STYLE.get(a.severity, (\"⚪\", \"info\"))\n            if kind == \"critical\":\n                st.error(f\"{icon} **[{a.severity}] {a.kpi} — {a.month}**  \\n{a.message}\")\n            elif kind == \"warning\":\n                st.warning(f\"{icon} **[{a.severity}] {a.kpi} — {a.month}**  \\n{a.message}\")\n            else:\n                st.info(f\"{icon} **[{a.severity}] {a.kpi} — {a.month}**  \\n{a.message}\")\n\n    st.markdown(\"---\")\n    st.subheader(\"Alert timeline\")\n    if alerts:\n        al_df = pd.DataFrame(\n            [{\"month\": a.month, \"kpi\": a.kpi, \"severity\": a.severity, \"value\": a.value} for a in alerts]\n        )\n        sev_order = {\"CRITICAL\": 3, \"WARNING\": 2, \"INFO\": 1}\n        al_df[\"sev_rank\"] = al_df[\"severity\"].map(sev_order)\n        fig = px.scatter(\n            al_df, x=\"month\", y=\"kpi\", color=\"severity\", size=\"sev_rank\",\n            category_orders={\"severity\": [\"CRITICAL\", \"WARNING\", \"INFO\"]},\n            labels={\"month\": \"Month\", \"kpi\": \"KPI\"},\n        )\n        fig.update_layout(height=320, margin=dict(l=10, r=10, t=30, b=10))\n        _chart(fig, \"alert_timeline\")\n    else:\n        st.write(\"—\")\n\nwith st.expander(\"Data preview\", expanded=False):\n    st.dataframe(df.sort_values(\"month\"), width=\"stretch\", hide_index=True)\n", "src/__init__.py": "\"\"\"Sales KPI Command Center — calculation and alert logic.\"\"\"\n\nfrom src.alerts import Alert, evaluate_alerts\nfrom src.data import generate_synthetic_data, load_csv, validate_dataframe\nfrom src.funnel import compute_conversion_rate, compute_funnel, compute_funnel_table\nfrom src.metrics import (\n    compute_churn_rate,\n    compute_mom_change,\n    compute_mrr_trend,\n    compute_summary,\n)\n\n__all__ = [\n    \"Alert\",\n    \"compute_churn_rate\",\n    \"compute_conversion_rate\",\n    \"compute_funnel\",\n    \"compute_funnel_table\",\n    \"compute_mom_change\",\n    \"compute_mrr_trend\",\n    \"compute_summary\",\n    \"evaluate_alerts\",\n    \"generate_synthetic_data\",\n    \"load_csv\",\n    \"validate_dataframe\",\n]\n", "src/alerts.py": "\"\"\"KPI閾値アラートロジック。純関数。\n\n閾値はデフォルト値を持つが、UIから上書き可能。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom collections.abc import Iterable\nfrom dataclasses import dataclass\n\nimport numpy as np\nimport pandas as pd\n\nfrom src.metrics import _safe_ratio, compute_churn_rate\n\nSEVERITY_INFO = \"INFO\"\nSEVERITY_WARNING = \"WARNING\"\nSEVERITY_CRITICAL = \"CRITICAL\"\n\n_SEVERITY_ORDER = {SEVERITY_INFO: 0, SEVERITY_WARNING: 1, SEVERITY_CRITICAL: 2}\n\nDEFAULT_THRESHOLDS: dict[str, float] = {\n    \"churn_warning\": 0.06,\n    \"churn_critical\": 0.10,\n    \"mrr_drop_warning\": -0.10,\n    \"mrr_drop_critical\": -0.20,\n    \"conversion_warning\": 0.015,\n    \"conversion_critical\": 0.008,\n    \"negative_mrr_streak\": 2,\n}\n\n\n@dataclass(frozen=True)\nclass Alert:\n    \"\"\"単一アラート。\"\"\"\n\n    kpi: str\n    severity: str\n    month: str\n    value: float\n    threshold: float\n    message: str\n\n    @property\n    def rank(self) -> int:\n        return _SEVERITY_ORDER.get(self.severity, 0)\n\n\ndef evaluate_alerts(\n    df: pd.DataFrame,\n    thresholds: dict[str, float] | None = None,\n) -> list[Alert]:\n    \"\"\"DataFrame全体を走査し、閾値超過のアラートを返す。\n\n    Args:\n        df: REQUIRED_COLUMNS を持つ月次DataFrame。\n        thresholds: 閾値オーバーライド。未指定時はDEFAULT_THRESHOLDS。\n\n    Returns:\n        重大度高順、月降順でソートされたAlertのリスト。空データ時は空リスト。\n    \"\"\"\n    if df is None or df.empty:\n        return []\n\n    th = {**DEFAULT_THRESHOLDS, **(thresholds or {})}\n    d = df.sort_values(\"month\").reset_index(drop=True)\n    alerts: list[Alert] = []\n\n    churn_rates = compute_churn_rate(d)\n    for i, row in d.iterrows():\n        month = str(row[\"month\"])\n        churn = float(churn_rates.iloc[i])\n        if churn >= th[\"churn_critical\"]:\n            alerts.append(\n                _alert(\"Churn\", SEVERITY_CRITICAL, month, churn, th[\"churn_critical\"],\n                       f\"Churn rate {churn:.1%} >= {th['churn_critical']:.1%}\")\n            )\n        elif churn >= th[\"churn_warning\"]:\n            alerts.append(\n                _alert(\"Churn\", SEVERITY_WARNING, month, churn, th[\"churn_warning\"],\n                       f\"Churn rate {churn:.1%} >= {th['churn_warning']:.1%}\")\n            )\n\n    mrr = d[\"mrr\"].astype(float).to_numpy()\n    prev = np.concatenate([[np.nan], mrr[:-1]])\n    with np.errstate(divide=\"ignore\", invalid=\"ignore\"):\n        growth = np.where(prev > 0, (mrr - prev) / prev, 0.0)\n    growth = np.nan_to_num(growth, nan=0.0, posinf=0.0, neginf=0.0)\n\n    negative_streak = 0\n    for i, row in enumerate(d.itertuples(index=False)):\n        month = str(row.month)\n        g = float(growth[i])\n        if i == 0:\n            continue\n        if g <= th[\"mrr_drop_critical\"]:\n            alerts.append(\n                _alert(\"MRR\", SEVERITY_CRITICAL, month, g, th[\"mrr_drop_critical\"],\n                       f\"MRR MoM {g:+.1%} <= {th['mrr_drop_critical']:+.1%}\")\n            )\n        elif g <= th[\"mrr_drop_warning\"]:\n            alerts.append(\n                _alert(\"MRR\", SEVERITY_WARNING, month, g, th[\"mrr_drop_warning\"],\n                       f\"MRR MoM {g:+.1%} <= {th['mrr_drop_warning']:+.1%}\")\n            )\n        if g < 0:\n            negative_streak += 1\n            if negative_streak >= int(th[\"negative_mrr_streak\"]):\n                alerts.append(\n                    _alert(\"MRR\", SEVERITY_INFO, month, float(g), th[\"negative_mrr_streak\"],\n                           f\"MRR decline for {negative_streak} consecutive months\")\n                )\n        else:\n            negative_streak = 0\n\n    for _, row in d.iterrows():\n        month = str(row[\"month\"])\n        conv = _safe_ratio(float(row[\"won_deals\"]), float(row[\"leads\"]))\n        if conv <= th[\"conversion_critical\"] and conv > 0:\n            alerts.append(\n                _alert(\"Conversion\", SEVERITY_CRITICAL, month, conv, th[\"conversion_critical\"],\n                       f\"Conversion {conv:.2%} <= {th['conversion_critical']:.2%}\")\n            )\n        elif conv < th[\"conversion_warning\"]:\n            alerts.append(\n                _alert(\"Conversion\", SEVERITY_WARNING, month, conv, th[\"conversion_warning\"],\n                       f\"Conversion {conv:.2%} < {th['conversion_warning']:.2%}\")\n            )\n\n    return _dedupe(alerts)\n\n\ndef _alert(kpi: str, severity: str, month: str, value: float, threshold: float, message: str) -> Alert:\n    return Alert(kpi=kpi, severity=severity, month=month, value=value, threshold=threshold, message=message)\n\n\ndef _dedupe(alerts: Iterable[Alert]) -> list[Alert]:\n    \"\"\"同一(kpi, severity, month)の重複を除去し、重大度高順・月降順で返す。\"\"\"\n    seen: dict[tuple, Alert] = {}\n    for a in alerts:\n        key = (a.kpi, a.severity, a.month)\n        if key not in seen or a.rank > seen[key].rank:\n            seen[key] = a\n    return sorted(seen.values(), key=lambda a: (-a.rank, a.month))\n\n\ndef sort_alerts(alerts: Iterable[Alert]) -> list[Alert]:\n    \"\"\"アラートを重大度高順、月降順でソートする。\"\"\"\n    return sorted(list(alerts), key=lambda a: (-a.rank, a.month), reverse=False)\n", "src/brand.py": "\"\"\"portfolio-hub と視覚言語を揃える共通ブランドテーマ（Streamlit 用）。\n\n- near-white グラデ背景 / slate 文字 / teal・blue アクセント\n- 半透明の白カード + blur / 8px 角丸 / uppercase キッカー + 大きな見出し\n\n外部依存なし。各アプリの ``streamlit_app.py`` から::\n\n    from src.brand import apply_brand, hero\n    apply_brand(st)          # set_page_config の後に一度だけ\n    hero(st, \"Kicker\", \"タイトル\", \"サブ説明\")\n\"\"\"\n\nfrom __future__ import annotations\n\n_BRAND_CSS = \"\"\"\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');\n\n:root {\n  --bg:#f8fafc; --fg:#0f172a; --muted:rgba(15,23,42,0.66);\n  --surface:rgba(255,255,255,0.82); --line:rgba(15,23,42,0.12);\n  --accent:#0f766e; --accent2:#2563eb;\n  --shadow:0 18px 50px rgba(15,23,42,0.08);\n}\n\n/* typography（アイコンフォントは触らない） */\nhtml, body, .stApp, .stMarkdown, p, li, span, label,\nh1, h2, h3, h4, button, input, textarea, select,\n[data-testid=\"stMetricValue\"], [data-testid=\"stMetricLabel\"],\n[data-testid=\"stWidgetLabel\"] {\n  font-family: 'Inter', system-ui, -apple-system, \"Segoe UI\", sans-serif;\n}\n\n/* 背景グラデ（portfolio-hub .portfolio-shell 相当） */\n.stApp {\n  background:\n    linear-gradient(180deg, rgba(248,250,252,0.92), rgba(241,245,249,0.96) 42%, rgba(15,23,42,0.05)),\n    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.95), rgba(219,234,254,0.55) 42%, rgba(15,23,42,0.06));\n  color: var(--fg);\n}\n\n/* Streamlit クロームを控えめに */\nheader[data-testid=\"stHeader\"] { background: transparent; }\n[data-testid=\"stToolbar\"], #MainMenu, footer { visibility: hidden; height: 0; }\n[data-testid=\"stDecoration\"] { display: none; }\n\n/* 本文幅と余白 */\n.block-container, [data-testid=\"stMainBlockContainer\"] {\n  max-width: 1180px; padding-top: 2.2rem; padding-bottom: 3rem;\n}\n\n/* 見出し */\nh1 { font-weight: 800 !important; letter-spacing: -0.02em; line-height: 1.05; color: var(--fg); }\nh2 { font-weight: 700 !important; letter-spacing: -0.01em; color: var(--fg); }\nh3 { font-weight: 700 !important; color: var(--fg); }\n\n/* Hero ブロック */\n.brand-hero { margin: 6px 0 30px; }\n.brand-kicker {\n  color: var(--accent); font-size: .78rem; font-weight: 700;\n  letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px;\n}\n.brand-title {\n  font-size: clamp(2.1rem, 5vw, 3.5rem); font-weight: 800;\n  line-height: 1.03; letter-spacing: -0.025em; color: var(--fg); margin: 0;\n}\n.brand-sub {\n  color: var(--muted); font-size: 1.02rem; line-height: 1.8;\n  margin-top: 14px; max-width: 760px;\n}\n\n/* サイドバー = 半透明サーフェス */\n[data-testid=\"stSidebar\"] {\n  background: rgba(255,255,255,0.72); backdrop-filter: blur(16px);\n  border-right: 1px solid var(--line);\n}\n[data-testid=\"stSidebar\"] .brand-kicker { margin-top: 4px; }\n\n/* metric をカード化 */\n[data-testid=\"stMetric\"] {\n  background: var(--surface); border: 1px solid var(--line);\n  border-radius: 12px; padding: 16px 18px; box-shadow: var(--shadow);\n  backdrop-filter: blur(12px);\n}\n[data-testid=\"stMetricValue\"] { color: var(--fg); font-weight: 800; }\n[data-testid=\"stMetricLabel\"] { color: var(--muted); }\n\n/* ボタン = ダークプライマリ */\n.stButton > button, .stDownloadButton > button, .stFormSubmitButton > button {\n  border-radius: 8px; border: 1px solid #0f172a; background: #0f172a;\n  color: #fff; font-weight: 700; padding: 8px 16px;\n  transition: transform .15s ease, background .15s ease;\n}\n.stButton > button:hover, .stDownloadButton > button:hover,\n.stFormSubmitButton > button:hover {\n  background: #020617; transform: translateY(-1px); border-color: #0f172a; color: #fff;\n}\n\n/* タブ */\n.stTabs [data-baseweb=\"tab-list\"] { gap: 6px; border-bottom: 1px solid var(--line); }\n.stTabs [data-baseweb=\"tab\"] { font-weight: 700; color: var(--muted); }\n.stTabs [aria-selected=\"true\"] { color: var(--fg); }\n\n/* 表・expander をカード化 */\n[data-testid=\"stDataFrame\"], [data-testid=\"stTable\"] {\n  border: 1px solid var(--line); border-radius: 12px; overflow: hidden;\n  box-shadow: var(--shadow);\n}\n[data-testid=\"stExpander\"] {\n  border: 1px solid var(--line); border-radius: 12px;\n  background: var(--surface); box-shadow: var(--shadow);\n}\n\n/* 入力の角丸 */\n[data-baseweb=\"select\"] > div, .stTextInput input, .stTextArea textarea,\n.stNumberInput input { border-radius: 8px !important; }\n\n/* 通知・区切り */\n[data-testid=\"stNotification\"], .stAlert { border-radius: 10px; }\nhr { border-color: var(--line); }\n</style>\n\"\"\"\n\n\ndef apply_brand(st) -> None:\n    \"\"\"ブランド CSS を注入する。``st.set_page_config`` の後に一度だけ呼ぶ。\"\"\"\n    st.markdown(_BRAND_CSS, unsafe_allow_html=True)\n\n\ndef _esc(text: str) -> str:\n    return (\n        str(text)\n        .replace(\"&\", \"&amp;\")\n        .replace(\"<\", \"&lt;\")\n        .replace(\">\", \"&gt;\")\n    )\n\n\ndef hero(st, kicker: str, title: str, subtitle: str | None = None) -> None:\n    \"\"\"portfolio-hub 風のヒーロー見出し（キッカー + 大見出し + サブ説明）。\"\"\"\n    html = (\n        '<div class=\"brand-hero\">'\n        f'<div class=\"brand-kicker\">{_esc(kicker)}</div>'\n        f'<div class=\"brand-title\">{_esc(title)}</div>'\n    )\n    if subtitle:\n        html += f'<div class=\"brand-sub\">{_esc(subtitle)}</div>'\n    html += \"</div>\"\n    st.markdown(html, unsafe_allow_html=True)\n", "src/data.py": "\"\"\"Synthetic SaaS KPI data generation, CSV loading, and validation.\n\n合成データであり、実在企業の数値を模倣しない。\n\"\"\"\n\nfrom __future__ import annotations\n\nfrom pathlib import Path\n\nimport numpy as np\nimport pandas as pd\n\nREQUIRED_COLUMNS: tuple[str, ...] = (\n    \"month\",\n    \"mrr\",\n    \"customers\",\n    \"new_customers\",\n    \"churned_customers\",\n    \"leads\",\n    \"qualified_leads\",\n    \"opportunities\",\n    \"won_deals\",\n)\n\nNUMERIC_COLUMNS: tuple[str, ...] = REQUIRED_COLUMNS[1:]\n\nDEFAULT_MONTHS = 24\nDEFAULT_SEED = 42\n\n\ndef generate_synthetic_data(months: int = DEFAULT_MONTHS, seed: int = DEFAULT_SEED) -> pd.DataFrame:\n    \"\"\"架空のSaaS月次KPIデータを生成する。\n\n    Args:\n        months: 生成する月数。\n        seed: 乱数シード。\n\n    Returns:\n        REQUIRED_COLUMNS をすべて持つ月次DataFrame。実在企業とは無関係の合成値。\n    \"\"\"\n    if months <= 0:\n        return _empty_frame()\n\n    rng = np.random.default_rng(seed)\n    start = pd.Timestamp(\"2023-01-01\")\n    month_labels = [\n        (start + pd.offsets.MonthBegin(i)).strftime(\"%Y-%m\") for i in range(months)\n    ]\n\n    customers = 200.0\n    mrr = 50_000.0\n    rows: list[dict] = []\n    for label in month_labels:\n        # 成長トレンド + ノイズ。実在企業の規模感を避けるため明示的に架空の数値。\n        gross_adds = max(0.0, rng.normal(18.0, 5.0))\n        churn_share = rng.normal(0.04, 0.01)\n        churn_share = float(np.clip(churn_share, 0.005, 0.12))\n        churned = max(0.0, round(customers * churn_share))\n        new_customers = max(0.0, round(gross_adds))\n        customers = max(0.0, customers + new_customers - churned)\n\n        arpu = mrr / max(customers, 1.0)\n        arpu_next = arpu * float(np.clip(rng.normal(1.005, 0.02), 0.9, 1.15))\n        mrr = max(0.0, customers * arpu_next)\n\n        leads = int(max(0.0, rng.normal(950.0, 120.0)))\n        qualified_leads = int(max(0.0, round(leads * float(np.clip(rng.normal(0.42, 0.05), 0.2, 0.7)))))\n        opportunities = int(max(0.0, round(qualified_leads * float(np.clip(rng.normal(0.38, 0.05), 0.2, 0.7)))))\n        won_deals = int(max(0.0, round(opportunities * float(np.clip(rng.normal(0.20, 0.04), 0.05, 0.5)))))\n\n        rows.append(\n            {\n                \"month\": label,\n                \"mrr\": round(mrr, 2),\n                \"customers\": int(customers),\n                \"new_customers\": int(new_customers),\n                \"churned_customers\": int(churned),\n                \"leads\": leads,\n                \"qualified_leads\": qualified_leads,\n                \"opportunities\": opportunities,\n                \"won_deals\": won_deals,\n            }\n        )\n\n    df = pd.DataFrame(rows, columns=list(REQUIRED_COLUMNS))\n\n    # アラート機能を示すため、意図的に異常月を2つ仕込む。\n    if len(df) >= 12:\n        anomaly_idx = len(df) // 2\n        df.loc[anomaly_idx, \"churned_customers\"] = int(df.loc[anomaly_idx, \"customers\"] * 0.11)\n        df.loc[anomaly_idx + 1, \"mrr\"] = df.loc[anomaly_idx + 1, \"mrr\"] * 0.82\n        df.loc[anomaly_idx + 1, \"won_deals\"] = max(0, df.loc[anomaly_idx + 1, \"won_deals\"] // 3)\n\n    return df\n\n\ndef load_csv(path: str | Path) -> pd.DataFrame:\n    \"\"\"CSVを読み込み、検証して正規化する。\n\n    Args:\n        path: CSVファイルのパス。\n\n    Returns:\n        REQUIRED_COLUMNS を持つDataFrame。空・不正な場合は空フレームを返す。\n    \"\"\"\n    p = Path(path)\n    if not p.exists() or p.stat().st_size == 0:\n        return _empty_frame()\n    try:\n        raw = pd.read_csv(p)\n    except (pd.errors.EmptyDataError, pd.errors.ParserError, UnicodeDecodeError):\n        return _empty_frame()\n    return validate_dataframe(raw)\n\n\ndef validate_dataframe(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"入力DataFrameを検証し、型を整えて返す。\n\n    欠損列は0/空で補完する。数値は非負にクリップする。月は文字列化。\n    空DataFrameや全欠損の場合は空フレームを返す（例外は投げない）。\n    \"\"\"\n    if df is None or len(df) == 0:\n        return _empty_frame()\n\n    out = pd.DataFrame(index=df.index)\n    if \"month\" in df.columns:\n        out[\"month\"] = df[\"month\"].astype(str).str.strip()\n    else:\n        out[\"month\"] = \"\"\n\n    for col in NUMERIC_COLUMNS:\n        if col in df.columns:\n            series = pd.to_numeric(df[col], errors=\"coerce\").fillna(0.0)\n            series = series.clip(lower=0.0)\n        else:\n            series = 0.0\n        out[col] = series\n\n    out = out[list(REQUIRED_COLUMNS)]\n    out = out[out[\"month\"].astype(str).str.len() > 0].reset_index(drop=True)\n    if out.empty:\n        return _empty_frame()\n    return out\n\n\ndef _empty_frame() -> pd.DataFrame:\n    return pd.DataFrame({c: pd.Series(dtype=\"float64\") for c in REQUIRED_COLUMNS})\n", "src/funnel.py": "\"\"\"ファネル計算ロジック。純関数。\n\nリード -> MQL(qualified) -> SQL(opportunities) -> Won の段階変換を扱う。\n\"\"\"\n\nfrom __future__ import annotations\n\nimport pandas as pd\n\nfrom src.metrics import _safe_ratio\n\nFUNNEL_STAGES: tuple[str, ...] = (\"leads\", \"qualified_leads\", \"opportunities\", \"won_deals\")\nFUNNEL_LABELS: dict[str, str] = {\n    \"leads\": \"Leads\",\n    \"qualified_leads\": \"MQL\",\n    \"opportunities\": \"SQL\",\n    \"won_deals\": \"Won\",\n}\n\n\ndef compute_funnel(df: pd.DataFrame, month: str | None = None) -> dict:\n    \"\"\"指定月（未指定時は最新月）のファネル段階別件数と段階間変換率を返す。\n\n    Returns:\n        month, stages(ラベル→件数のdict), step_rates(段階間レートのdict),\n        overall_rate(won/leads), total_leads, won を含むdict。\n    \"\"\"\n    if df is None or df.empty:\n        return _empty_funnel()\n    d = df.sort_values(\"month\").reset_index(drop=True)\n    if month is not None:\n        match = d[d[\"month\"].astype(str) == str(month)]\n        if match.empty:\n            return _empty_funnel()\n        row = match.iloc[-1]\n    else:\n        row = d.iloc[-1]\n\n    stages = {FUNNEL_LABELS[s]: int(row[s]) for s in FUNNEL_STAGES}\n    step_rates = {\n        f\"{FUNNEL_LABELS[FUNNEL_STAGES[i]]}->{FUNNEL_LABELS[FUNNEL_STAGES[i + 1]]}\": _safe_ratio(\n            float(row[FUNNEL_STAGES[i + 1]]), float(row[FUNNEL_STAGES[i]])\n        )\n        for i in range(len(FUNNEL_STAGES) - 1)\n    }\n    overall = _safe_ratio(float(row[\"won_deals\"]), float(row[\"leads\"]))\n    return {\n        \"month\": str(row[\"month\"]),\n        \"stages\": stages,\n        \"step_rates\": step_rates,\n        \"overall_rate\": overall,\n        \"total_leads\": int(row[\"leads\"]),\n        \"won\": int(row[\"won_deals\"]),\n    }\n\n\ndef compute_funnel_table(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"全月のファネル段階と主要変換率を表形式で返す。\"\"\"\n    if df is None or df.empty:\n        return pd.DataFrame(columns=[\"month\", *FUNNEL_STAGES, \"lead_to_mql\", \"mql_to_sql\", \"sql_to_won\", \"lead_to_won\"])\n    d = df.sort_values(\"month\").reset_index(drop=True).copy()\n    d[\"lead_to_mql\"] = d.apply(lambda r: _safe_ratio(r[\"qualified_leads\"], r[\"leads\"]), axis=1)\n    d[\"mql_to_sql\"] = d.apply(lambda r: _safe_ratio(r[\"opportunities\"], r[\"qualified_leads\"]), axis=1)\n    d[\"sql_to_won\"] = d.apply(lambda r: _safe_ratio(r[\"won_deals\"], r[\"opportunities\"]), axis=1)\n    d[\"lead_to_won\"] = d.apply(lambda r: _safe_ratio(r[\"won_deals\"], r[\"leads\"]), axis=1)\n    cols = [\"month\", *FUNNEL_STAGES, \"lead_to_mql\", \"mql_to_sql\", \"sql_to_won\", \"lead_to_won\"]\n    return d[cols]\n\n\ndef compute_conversion_rate(df: pd.DataFrame, from_stage: str = \"leads\", to_stage: str = \"won_deals\") -> pd.DataFrame:\n    \"\"\"2段階間の月次変換率を返す。\"\"\"\n    if df is None or df.empty or from_stage not in df.columns or to_stage not in df.columns:\n        return pd.DataFrame(columns=[\"month\", \"conversion_rate\"])\n    d = df.sort_values(\"month\").reset_index(drop=True).copy()\n    d[\"conversion_rate\"] = d.apply(lambda r: _safe_ratio(r[to_stage], r[from_stage]), axis=1)\n    return d[[\"month\", \"conversion_rate\"]]\n\n\ndef _empty_funnel() -> dict:\n    return {\n        \"month\": None,\n        \"stages\": {FUNNEL_LABELS[s]: 0 for s in FUNNEL_STAGES},\n        \"step_rates\": {},\n        \"overall_rate\": 0.0,\n        \"total_leads\": 0,\n        \"won\": 0,\n    }\n", "src/metrics.py": "\"\"\"KPI集計ロジック。UIから独立した純関数。\n\n単位: mrr は USD、レートは割合(0.0-1.0)。\n\"\"\"\n\nfrom __future__ import annotations\n\nimport numpy as np\nimport pandas as pd\n\nMRR_UNIT = \"USD\"\nRATE_UNIT = \"ratio\"\n\n\ndef compute_summary(df: pd.DataFrame) -> dict:\n    \"\"\"最新月と前月をもとに主要KPIサマリーを返す。\n\n    Args:\n        df: REQUIRED_COLUMNS を持つ月次DataFrame。\n\n    Returns:\n        latest_month, prev_month, mrr, mrr_delta, mrr_growth,\n        customers, new_customers, churned_customers, churn_rate,\n        conversion_rate, net_new_customers を含むdict。\n        空データの場合は値がNone/0の辞書を返す。\n    \"\"\"\n    if df is None or df.empty:\n        return _empty_summary()\n\n    d = df.sort_values(\"month\").reset_index(drop=True)\n    latest = d.iloc[-1]\n    prev = d.iloc[-2] if len(d) >= 2 else latest\n\n    mrr = float(latest[\"mrr\"])\n    mrr_prev = float(prev[\"mrr\"])\n    mrr_delta = mrr - mrr_prev\n    mrr_growth = _safe_ratio(mrr_delta, mrr_prev)\n\n    customers = int(latest[\"customers\"])\n    new_customers = int(latest[\"new_customers\"])\n    churned = int(latest[\"churned_customers\"])\n    net_new = new_customers - churned\n\n    churn_rate = float(compute_churn_rate(latest))\n    conv_rate = _safe_ratio(float(latest[\"won_deals\"]), float(latest[\"leads\"]))\n\n    return {\n        \"latest_month\": str(latest[\"month\"]),\n        \"prev_month\": str(prev[\"month\"]),\n        \"mrr\": mrr,\n        \"mrr_delta\": mrr_delta,\n        \"mrr_growth\": mrr_growth,\n        \"customers\": customers,\n        \"new_customers\": new_customers,\n        \"churned_customers\": churned,\n        \"churn_rate\": churn_rate,\n        \"conversion_rate\": conv_rate,\n        \"net_new_customers\": net_new,\n    }\n\n\ndef compute_mrr_trend(df: pd.DataFrame) -> pd.DataFrame:\n    \"\"\"月次MRR推移と前月差・成長率を返す。\"\"\"\n    if df is None or df.empty:\n        return pd.DataFrame(columns=[\"month\", \"mrr\", \"mrr_delta\", \"mrr_growth\"])\n    d = df.sort_values(\"month\").reset_index(drop=True).copy()\n    d[\"mrr_delta\"] = d[\"mrr\"].diff().fillna(0.0)\n    d[\"mrr_growth\"] = _mom_ratios(d[\"mrr\"])\n    return d[[\"month\", \"mrr\", \"mrr_delta\", \"mrr_growth\"]]\n\n\ndef compute_mom_change(df: pd.DataFrame, column: str) -> pd.DataFrame:\n    \"\"\"任意の数値列の月次推移とMoM変化率を返す。\"\"\"\n    empty_cols = [\"month\", column, f\"{column}_mom\"]\n    if df is None or df.empty or column not in df.columns:\n        return pd.DataFrame(columns=empty_cols)\n    d = df.sort_values(\"month\").reset_index(drop=True).copy()\n    series = pd.to_numeric(d[column], errors=\"coerce\").fillna(0.0)\n    d[column] = series\n    d[f\"{column}_mom\"] = _mom_ratios(series)\n    return d[[\"month\", column, f\"{column}_mom\"]]\n\n\ndef compute_churn_rate(row: pd.Series | pd.DataFrame) -> float | pd.Series:\n    \"\"\"チャーンレート = churned_customers / customers。\n\n    customersは月末残。customers <= 0 のときは 0.0 を返す（0割回避）。\n    \"\"\"\n    if isinstance(row, pd.DataFrame):\n        cust = row[\"customers\"].astype(float).to_numpy()\n        churned = row[\"churned_customers\"].astype(float).to_numpy()\n        with np.errstate(divide=\"ignore\", invalid=\"ignore\"):\n            rates = np.where(cust > 0, churned / cust, 0.0)\n        return pd.Series(np.clip(rates, 0.0, None), index=row.index)\n    customers = float(row[\"customers\"])\n    churned = float(row[\"churned_customers\"])\n    if customers <= 0:\n        return 0.0\n    return churned / customers\n\n\ndef _mom_ratios(series: pd.Series) -> pd.Series:\n    \"\"\"前月比変化率を計算する。前月0のときは0を返す（0割回避）。\"\"\"\n    prev = series.shift(1)\n    with np.errstate(divide=\"ignore\", invalid=\"ignore\"):\n        ratios = np.where(prev > 0, (series - prev) / prev, 0.0)\n    return pd.Series(ratios, index=series.index)\n\n\ndef _safe_ratio(num: float, denom: float) -> float:\n    if denom <= 0:\n        return 0.0\n    return num / denom\n\n\ndef _empty_summary() -> dict:\n    return {\n        \"latest_month\": None,\n        \"prev_month\": None,\n        \"mrr\": 0.0,\n        \"mrr_delta\": 0.0,\n        \"mrr_growth\": 0.0,\n        \"customers\": 0,\n        \"new_customers\": 0,\n        \"churned_customers\": 0,\n        \"churn_rate\": 0.0,\n        \"conversion_rate\": 0.0,\n        \"net_new_customers\": 0,\n    }\n", ".streamlit/config.toml": "[theme]\nbase = \"light\"\nprimaryColor = \"#0f766e\"\nbackgroundColor = \"#f8fafc\"\nsecondaryBackgroundColor = \"#ffffff\"\ntextColor = \"#0f172a\"\nfont = \"sans serif\"\n", "data/sample_kpis.csv": "month,mrr,customers,new_customers,churned_customers,leads,qualified_leads,opportunities,won_deals\n20
